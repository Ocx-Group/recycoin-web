apiVersion: apps/v1
kind: Deployment
metadata:
  name: recycoin-web
  namespace: ecosystem
  labels:
    app: recycoin-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recycoin-web
  template:
    metadata:
      labels:
        app: recycoin-web
        tier: frontend
    spec:
      containers:
        - name: recycoin-web
          image: registry.digitalocean.com/ocx-registry/recycoin-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: ocx-registry
